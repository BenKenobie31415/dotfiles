window:
  padding:
    x: 10
    y: 10
  dimensions:
    columns: 100
    lines: 30
  dynamic_title: true
  opacity: 0.65


scrolling:
  history: 5000
  multiplier: 2

font:
  normal:
    family: FiraCode Nerd Font Mono
    style: Regular
  size: 8.5
draw_bold_text_with_bright_colors: true

import:
  # uncomment the flavour you want below:
  - ~/.config/alacritty/catppuccin/catppuccin-mocha.yml
